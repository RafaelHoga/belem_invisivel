<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Contato - Hotel Belém</title>
 <link rel="stylesheet" href="css/contato.css">
</head>
<body>

<header>
    <h1>Contato</h1>
    <p>Entre em contato para reservas e dicas em Belém</p>
</header>
<main>
    <section class="contato">
        <h2>Entre em contato</h2>
        <form id="formContato">
            <div class="grupo">
                <label>Nome</label>
                <input type="text" id="nome">
                <small class="erro"></small>
            </div>
            <div class="grupo">
                <label>Email</label>
                <input type="email" id="email">
                <small class="erro"></small>
            </div>
            <div class="grupo">
                <label>Telefone</label>
                <input type="tel" id="telefone">
                <small class="erro"></small>
            </div>

            <div class="grupo">
                <label>Mensagem</label>
                <textarea id="mensagem"></textarea>
                <small class="erro"></small>
            </div>
            <button type="submit">Enviar</button>
            <p id="status"></p>
            <article class="card">

            </article>
        </form>
    </section>
</main>



<script>
const form = document.getElementById("formContato");

// Carregar dados salvos ao abrir a página
window.addEventListener("load", () => {
const dados = JSON.parse(localStorage.getItem("contato"));

if (dados) {
document.getElementById("nome").value = dados.nome || "";
document.getElementById("email").value = dados.email || "";
document.getElementById("telefone").value = dados.telefone || "";
document.getElementById("mensagem").value = dados.mensagem || "";
}
});

form.addEventListener("submit", function(e) {
e.preventDefault();

const nome = document.getElementById("nome");
const email = document.getElementById("email");
const telefone = document.getElementById("telefone");
const mensagem = document.getElementById("mensagem");
const status = document.getElementById("status");

let valido = true;

document.querySelectorAll(".erro").forEach(e => e.innerText = "");

// Validação
if (nome.value.trim().length < 3) {
nome.nextElementSibling.innerText = "Nome muito curto";
valido = false;
}

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailRegex.test(email.value)) {
email.nextElementSibling.innerText = "Email inválido";
valido = false;
}

if (telefone.value.trim().length < 10) {
telefone.nextElementSibling.innerText = "Telefone inválido";
valido = false;
}

if (mensagem.value.trim().length < 10) {
mensagem.nextElementSibling.innerText = "Mensagem muito curta";
valido = false;
}

if (!valido) return;

// SALVAR NO LOCAL STORAGE
const dados = {
nome: nome.value,
email: email.value,
telefone: telefone.value,
mensagem: mensagem.value
};

localStorage.setItem("contato", JSON.stringify(dados));

status.innerText = "Dados salvos no navegador!";
form.reset();
});
</script>

</body>
</html>
