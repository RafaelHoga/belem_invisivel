<body>
    
<section class="nova-avaliacao-container">
    <div class="avaliacao-box">
        <h3><i class="fa-regular fa-comment-dots"></i> Deixe sua Avaliação</h3>
        <p>Compartilhe a sua experiência neste local para ajudar outros viajantes.</p>

        <form id="formAvaliacao">
            <div class="input-group-estrelas">
                <label>Sua nota:</label>
                <div class="estrelas-interativas" id="ratingStars">
                    <i class="fa-regular fa-star" data-value="1"></i>
                    <i class="fa-regular fa-star" data-value="2"></i>
                    <i class="fa-regular fa-star" data-value="3"></i>
                    <i class="fa-regular fa-star" data-value="4"></i>
                    <i class="fa-regular fa-star" data-value="5"></i>
                </div>
                <input type="hidden" id="nota_avaliacao" name="nota_avaliacao" value="0" required>
            </div>

            <div class="input-group">
                <label for="comentario_texto">Seu comentário</label>
                <textarea id="comentario_texto" name="comentario" rows="4" placeholder="Conte o que você mais gostou, o atendimento, os preços..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar-avaliacao">Enviar Avaliação</button>
        </form>
        <p id="feedbackAvaliacao"></p>
    </div>
</section>
</body>
<style>
    /* Container da área de novas avaliações */
.nova-avaliacao-container {
    padding: 40px 20px;
    background-color: var(--pasta); /* Tom suave do seu projeto */
    display: flex;
    justify-content: center;
    align-items: center;
}

.avaliacao-box {
    background: white;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    max-width: 600px;
    width: 100%;
}

.avaliacao-box h3 {
    text-align: center;
    color: var(--verde-escuro);
    font-size: 1.5rem;
    margin-bottom: 8px;
}

.avaliacao-box p {
    text-align: center;
    color: #666;
    font-size: 0.95rem;
    margin-bottom: 25px;
}

/* Estrelas Interativas */
.input-group-estrelas {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
    gap: 8px;
}

.input-group-estrelas label {
    font-weight: bold;
    color: var(--preto);
    font-size: 14px;
}

.estrelas-interativas {
    display: flex;
    gap: 8px;
}

.estrelas-interativas i {
    font-size: 2rem;
    color: #ccc;
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
}

/* Efeito ao passar o mouse ou quando a estrela estiver selecionada */
.estrelas-interativas i:hover,
.estrelas-interativas i.active {
    color: #f4c542; /* Dourado das estrelas */
    transform: scale(1.15);
}

/* Campos de texto normais */
.input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}

.input-group label {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
    color: var(--preto);
}

textarea {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
}

textarea:focus {
    border-color: var(--verde);
}

/* Botão de Envio seguindo o padrão de turismo do site */
.btn-enviar-avaliacao {
    width: 100%;
    background: var(--preto);
    color: var(--body);
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: bold;
    padding: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.1s;
}

.btn-enviar-avaliacao:hover {
    background: var(--verde-escuro);
}

.btn-enviar-avaliacao:active {
    transform: scale(0.98);
}

#feedbackAvaliacao {
    text-align: center;
    margin-top: 15px;
    font-weight: 500;
}
</style>
