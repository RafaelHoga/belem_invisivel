<header class="main-navbar">
    <div class="nav-container">
        <a href="{% url 'index' %}" class="logo">
            Belém<span>Invisível</span>
        </a>
        
        <nav id="nav-links" class="nav-navigation">
            <ul class="nav-list">
                <li><a href="{% url 'index' %}" class="nav-link active">Início</a></li>
                <li><a href="{% url 'tela-turismo' %}" class="nav-link">Turismo</a></li>
                <li><a href="{% url 'tela-hoteis' %}" class="nav-link">Hotéis</a></li>
                <li><a href="{% url 'tela-restaurante' %}" class="nav-link">Restaurantes</a></li>
                <li><a href="{% url 'contato' %}" class="nav-link">Contato</a></li> 

                {% if request.user.is_authenticated %}
                    <li class="user-menu-item">
                        <div class="user-menu-container" style="display: flex; align-items: center; gap: 15px;">
                            
                            {% if request.user.is_staff %}
                                <!-- Link exclusivo para o Administrador - Resolvido via Namespace -->
                                <a href="{% url 'usuario:painel_admin' %}" class="btn-acessar-guia" style="background-color: #1f5f3f;">
                                    <i class="fa-solid fa-sliders"></i> Painel Admin
                                </a>
                            {% else %}
                                <!-- Link padrão para o Usuário Comum -->
                                <a href="{% url 'usuario:perfil' %}" class="btn-acessar-guia">
                                    <i class="fa-solid fa-user-circle"></i> Meu Perfil
                                </a>
                            {% endif %}

                            <a href="{% url 'usuario:logout' %}" style="color: #ff4d4d; text-decoration: none; font-weight: 600; font-size: 0.9rem;" title="Sair do Guia">
                                <i class="fa-solid fa-right-from-bracket"></i> Sair
                            </a>
                        </div>
                    </li>
                {% else %}
                    <li>
                        <a href="{% url 'usuario:login' %}" class="btn-acessar-guia">Acessar Guia</a>
                    </li>
                {% endif %}
            </ul>
        </nav>
        
        <button class="hamburguer" id="hamburguer" aria-label="Abrir Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</header>
