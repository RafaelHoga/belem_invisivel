{% extends "admin/base.html" %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrastyle %}
<style>
    /* ==========================================================================
       REESTRUTURAÇÃO GLOBAL DO ADMIN - BELÉM INVISÍVEL 2026
       ========================================================================== */
    :root {
        --brand-primary: #1E4638;      /* Verde Igarapé Profundo */
        --brand-secondary: #3A8E72;    /* Verde Folha Amazônica */
        --brand-accent: #D4A373;       /* Dourado Sutil de Grafismos / Argila */
        --brand-light: #DAF3EA;        /* Creme Esmeralda Suave */
        --white: #FFFFFF;
        --radius-sm: 8px;
        --radius-md: 16px;
        --shadow-md: 0 8px 24px rgba(30, 70, 56, 0.08);
    }

    /* --- TOPO / HEADER --- */
    #header {
        background: var(--brand-primary) !important;
        border-bottom: 3px solid var(--brand-accent) !important;
    }
    #branding h1 a {
        color: var(--brand-accent) !important;
        font-weight: 700;
    }

    /* --- MUDANÇA ESTRUTURAL: ARREDONDANDO OS BLOCOS (.MODULE) --- */
    .module {
        background: var(--white) !important;
        border-radius: var(--radius-md) !important;
        box-shadow: var(--shadow-md) !important;
        overflow: hidden !important;
        border: none !important;
        margin-bottom: 24px !important;
    }

    .module h2, .module caption, #content-related h2 {
        background: var(--brand-secondary) !important;
        color: var(--white) !important;
        padding: 12px 16px !important;
    }

    /* --- BARRAS DE NAVEGAÇÃO (BREADCRUMBS) --- */
    div.breadcrumbs {
        background: var(--brand-light) !important;
        color: var(--brand-primary) !important;
        border-radius: var(--radius-sm) !important;
        margin-bottom: 20px !important;
        border: none !important;
    }
    div.breadcrumbs a { color: var(--brand-secondary) !important; }

    /* --- TABELAS INTERNAS --- */
    table {
        border-collapse: separate !important;
        border-spacing: 0 !important;
    }

    /* --- BOTÕES VERDADEIROS (Apenas ações principais) --- */
    .submit-row input, 
    .button, 
    .object-tools a, 
    a.addlink:not(.nav-sidebar .addlink) {
        background: var(--brand-primary) !important;
        color: var(--white) !important;
        border-radius: var(--radius-sm) !important;
        border: none !important;
        padding: 10px 18px !important;
        font-weight: 600 !important;
        display: inline-block !important;
        transition: all 0.2s ease !important;
    }

    .submit-row input:hover, .button:hover, .object-tools a:hover, a.addlink:not(.nav-sidebar .addlink):hover {
        background: var(--brand-secondary) !important;
    }

    /* --- CORREÇÃO DA BARRA LATERAL (IMAGE_3657BE.PNG) --- */
    .nav-sidebar table a {
        background: transparent !important;
        color: var(--brand-primary) !important;
        padding: 2px 4px !important;
        display: inline !important;
        font-weight: normal !important;
    }

    .nav-sidebar .addlink, .nav-sidebar .changelink {
        background: transparent !important;
        color: var(--brand-secondary) !important;
        font-weight: 500 !important;
        padding-left: 20px !important;
    }
    
    .nav-sidebar .addlink:hover, .nav-sidebar .changelink:hover {
        color: var(--brand-primary) !important;
        text-decoration: underline !important;
    }

    /* --- CORREÇÃO DO BOTÃO EXECUTAR (IMAGE_365F3D.JPG) --- */
    /* Alinha o select, o botão e a contagem de forma equilibrada em flexbox */
    div.actions {
        display: flex !important;
        align-items: center !important;
        gap: 12px !important;
        padding: 8px 0 !important;
        margin-bottom: 10px !important;
    }

    /* Reduz o padding excessivo apenas do botão de dentro das ações */
    div.actions button.button {
        padding: 4px 14px !important;
        font-size: 13px !important;
        height: auto !important;
        line-height: 1.5 !important;
        margin: 0 !important;
    }

    /* Customiza levemente o select ao lado do botão para harmonizar */
    div.actions select {
        padding: 4px 8px !important;
        height: auto !important;
        border-radius: var(--radius-sm) !important;
        border: 1px solid var(--brand-light) !important;
        background-color: var(--white) !important;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Painel Administrativo - Belém Invisível</a></h1>
{% endblock %}
