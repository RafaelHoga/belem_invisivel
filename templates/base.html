{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Belém Invisível{% endblock %}</title>

    <!-- Font Awesome 6 estável -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="{% static 'css/header.css' %}?v=2">
    <link rel="stylesheet" href="{% static 'css/botao_subir.css' %}?v=2">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    {% include 'header_menu_hero.html' %}

    {% block content %}
    {% endblock %}

    <!-- CRIADO DIRETO NO HTML: Evita falhas caso o JS demore a carregar -->
    <button id="backToTop" title="Voltar ao topo">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Scripts com versão para quebrar o cache do Django -->
    <script src="{% static 'js/botao_subir.js' %}?v=2"></script>
    <script src="{% static 'js/menu_hero.js' %}?v=2"></script>

</body>
</html>
