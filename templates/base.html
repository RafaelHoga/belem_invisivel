{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Belém Invisível{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/cards_global.css' %}?v=2026">
    <link rel="stylesheet" href="{% static 'css/header_global.css' %}?v=2026">
    <link rel="stylesheet" href="{% static 'css/botao_subir_global.css' %}?v=2026">
    <link rel="stylesheet" href="{% static 'css/carrossel_global.css' %}?v=2026">
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'header_menu_hero.html' %}

    <main class="main-layout">
        {% block content %}
        {% endblock %}
    </main>

    <button id="backToTop" title="Voltar ao topo" aria-label="Voltar ao topo">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="{% static 'js/carrossel_global.js' %}?v=2026"></script>
    <script src="{% static 'js/favorito_global.js' %}?v=2026"></script>
    <script src="{% static 'js/botao_subir_global.js' %}?v=2026"></script>
    <script src="{% static 'js/menu_hero_global.js' %}?v=2026"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
