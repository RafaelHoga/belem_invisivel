<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<article class="card-moderno">
    <div class="card-header">
        <img src="img/img-saude/hosp_porto.jpg" alt="Hospital Porto Dias">
        <span class="badge">Particular</span>
    </div>
    <div class="card-body">
        <h3>Hospital Porto Dias</h3>
        <p class="especialidade">Ortopedia • Cardiologia • Oncologia</p>
        <div class="card-info">
            <p><i class="fas fa-check-circle"></i> Hotelaria Premium</p>
            <p><i class="fas fa-helicopter"></i> Possui Heliponto</p>
        </div>
        <a href="#" class="btn-detalhes">Ver Localização</a>
    </div>
</article>
<style>
    :root{
    --max-width: 1200px;
    --body:white;
    --preto: #0B0B0D;
    --verde-escuro: #41836d;
    --verde: #6BB39B;
    --verde-pastel: #85E6C0;
    --verde-creme: #DAF3EA;
    --pasta: #F7F4E8;
}
*{
    box-sizing: border-box;
    margin: 0px;
    padding: 0px;
}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--body);
  overflow-x: hidden;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
    padding: 20px;
}

.card-moderno {
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    max-width: 550px;
}

.card-moderno:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 45px rgba(107, 179, 155, 0.2);
}

.card-header {
    position: relative;
    height: 300px;
}

.card-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.badge {
    position: absolute;
    top: 15px;
    right: 15px;
    background: var(--verde-escuro);
    color: white;
    padding: 5px 15px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: bold;
}

.card-body {
    padding: 25px;
}

.especialidade {
    color: var(--verde-escuro);
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 15px;
}

.card-info {
    margin: 15px 0;
    font-size: 0.85rem;
    color: #666;
}

.btn-detalhes {
    display: block;
    text-align: center;
    padding: 12px;
    background: var(--verde-creme);
    color: var(--verde-escuro);
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-detalhes:hover {
    background: var(--verde-escuro);
    color: white;
}
</style>
</body>
</html>
